name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        pip install -e .

    - name: Check code formatting with Ruff
      run: ruff format --check src/ test/ scripts/

    - name: Lint with Ruff
      run: ruff check src/ test/ scripts/

    - name: Type check with mypy
      run: mypy --exclude="_version" src/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run unit tests (parallel with pytest-xdist)
      # -n auto distributes the suite across the runner's CPU cores (issue #19). The
      # coverage [run] parallel/concurrency config in .coveragerc lets the xdist workers'
      # coverage data combine into the full total, so the 80% gate is enforced on the
      # complete run. Integration tests stay excluded (they require live AWS).
      run: |
        pytest test/bestehorn_llmmanager/ \
          -n auto \
          --cov=bestehorn_llmmanager --cov-report=xml \
          --ignore=test/integration/

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine check-manifest
    
    - name: Check MANIFEST.in
      run: check-manifest
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: |
        twine check dist/*
        ls -la dist/

    - name: Smoke-test the built wheel (clean env)
      # Install the freshly-built wheel into a clean venv (no editable install, repo src/
      # not on sys.path) and run the release smoke test, so packaging regressions —
      # a missing runtime dependency, a dropped package-data file, or an import error
      # only seen from an installed wheel — are caught on PRs, not only at release
      # (issue #46).
      run: |
        set -euo pipefail
        cp scripts/release_smoke_test.py "$RUNNER_TEMP/release_smoke_test.py"
        python -m venv "$RUNNER_TEMP/smoke-env"
        "$RUNNER_TEMP/smoke-env/bin/python" -m pip install --upgrade pip
        "$RUNNER_TEMP/smoke-env/bin/python" -m pip install dist/*.whl
        cd "$RUNNER_TEMP"
        ./smoke-env/bin/python release_smoke_test.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-packages
        path: dist/

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
