# Pre-commit hooks for bestehorn-llmmanager.
# This project uses the black/isort/flake8 toolchain (NOT ruff) at line-length 100.
# The git hook in .git/hooks/pre-commit (installed by scripts/setup-hooks.sh) runs only
# the fast checks (black + isort + flake8). Slow checks (mypy, bandit, pytest) run in CI
# or via `pre-commit run <id>` / the /run-ci slash command.
#
# src/bestehorn_llmmanager/_version.py is auto-generated by setuptools-scm and is
# excluded from every hook.
exclude: '^src/bestehorn_llmmanager/_version\.py$'

repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        args: ["--line-length=100"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
        exclude: '^(test/|scripts/|tmp/|venv/)'
        additional_dependencies: [types-PyYAML, types-requests]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        args: ["--cov=bestehorn_llmmanager", "--cov-fail-under=80"]
        pass_filenames: false
        always_run: true
        stages: [manual]
