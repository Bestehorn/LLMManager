# Pre-commit hooks for bestehorn-llmmanager.
# This project uses ruff (format + check) and mypy at line-length 100.
# The git hook in .git/hooks/pre-commit (installed by scripts/setup-hooks.sh) runs only
# the fast checks (ruff-check + ruff-format). Slow checks (mypy, pytest) run in CI
# or via `pre-commit run <id>` / the /run-ci slash command.
#
# Scope: ruff runs over src/, test/, and scripts/ — the trees the quality gate has
# always covered. examples/, notebooks/ (.ipynb), and root one-off helper scripts are
# intentionally NOT gated (the legacy black/flake8 gate never covered them either).
# src/bestehorn_llmmanager/_version.py is auto-generated by setuptools-scm and is
# excluded from every hook.
exclude: '^src/bestehorn_llmmanager/_version\.py$'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      # Run the linter first (with autofix) so its fixes get reformatted by ruff-format.
      - id: ruff-check
        args: ["--fix"]
        files: '^(src|test|scripts)/'
      - id: ruff-format
        files: '^(src|test|scripts)/'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
        exclude: '^(test/|scripts/|tmp/|venv/)'
        additional_dependencies: [types-PyYAML, types-requests]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        args: ["--cov=bestehorn_llmmanager", "--cov-fail-under=80"]
        pass_filenames: false
        always_run: true
        stages: [manual]
